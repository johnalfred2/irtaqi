Name: Irtaqi
Summary: Quran memorization with word-by-word reveal
Description: |
  A Quran memorization tool that displays pixel-exact Mushaf pages
  with words hidden and revealed one by one. Features:
  - Word-by-word reveal for active memorization
  - Per-page progress tracking with localStorage persistence
  - Touch gestures (tap, long-press, swipe)
  - Dark/light theme toggle
  - Ayah-aware navigation (prev/next complete ayah)
  - Page, surah, and juz navigation
  - Fully offline after initial download (Capacitor Android)

Repo: https://github.com/johnalfred2/irtaqi
RepoType: git

Builds:
  - versionName: 0.1.2
    versionCode: 3
    commit: v0.1.2
    subdir: quran-site
    init:
      - npm install
    output: android/app/build/outputs/apk/release/app-release.apk
    build:
      - npm run build
      - npx cap sync android
      - cd android && ./gradlew assembleRelease

